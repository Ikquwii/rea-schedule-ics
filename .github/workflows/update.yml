name: Update schedule ICS

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps
        run: npm ci || npm install

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Build schedule.ics
        env:
          GROUP: ${{ vars.GROUP || '15.24Д-Э07/24б' }}
          END_DATE: ${{ vars.END_DATE || '2026-06-27' }}
          MAX_WEEKS: '20'
        run: npm run build

      - name: Commit updated ICS
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/schedule.ics
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "chore: update schedule $(date -u +%Y-%m-%d)"
            git push
          fi

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
